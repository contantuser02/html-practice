<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Study and Usage of a Image....</title>
</head>
<body>
    <!--This is Using Without Using Any Image Path..-->
    <h1>Without Using Image Path...</h1>
    <image src="Null"
    height="300px"/>
    <hr>
    <!--This is Using With Using Any Image Path..-->
    <!-- This is Using without the Width...-->
    <h1>With Using Image Path...</h1>
    <image src="images/Anime.jpg"
    alt="This is the Image Of the Anime Place..."
    height="300px"/>
    <hr>
    <!-- This is Using With the Width...-->
     <h1>With Using Image Path...</h1>
    <image src="images/Anime.jpg"
    alt="This is the Image Of the Anime Place..."
    height="300px"
    width="300px"/>
    <hr>

    <!-- This is By using URL link or Direct Address from The chorme -->

</body>
