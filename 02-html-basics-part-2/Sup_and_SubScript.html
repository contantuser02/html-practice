<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Super and Sub Script...</title>
</head>
<body>
    <!-- Usecase of the Super and Sub Script....-->
     <h1> Normal Equation Writing without the Given Tag..</h1>
     <br>
     <p>(a+b)2=a2+b2+2ab</p>
     <hr>
     <!-- With Using The given Tags...-->
      <h1>Using the Tags Now...</h1>
      <p>(a+b)<sup>2</sup>=a<sup>2</sup>+b<sup>2</sup>+2ab</p>

<hr>

      <p>CH4</p>
      <hr>
      <p>CH<sub>4</sub></p>
      <hr>
    
</body>
</html>
