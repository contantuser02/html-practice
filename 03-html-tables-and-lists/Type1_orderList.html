<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Type1 of order list</title>
</head>
<body>
    <header>
        <h1>Computer Language</h1>
    </header>
    <main>
        <!-- Type 1-->
        <!--Attribute is Defined-->
        <big>
        <ol type="A">
            <li>HTML</li>
            <li>Python</li>
            <li>C++</li>
            <li>C</li>
            <li>java</li>
        </ol>
    </big>

    <hr>
    <hr>
    <!--Nested Attribute Defined here-->
    <big>
        <ol type="A">
            <li>HTML</li>
            <ol type="A">
                <li>Level0</li>
                <li>Level1</li>
                <li>Level2</li>
                <li>Level3</li>
                <li>Level4</li>
            </ol>
            <li>Python</li>
            <li>C++</li>
            <li>C</li>
            <li>java</li>
        </ol>
    </big>
    </main>
    <footer>
        <p>This is About Type1 of OrderList.</p>
    </footer>
    
</body>
</html>
