<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ColSpan in Tables</title>
</head>
<body>
    <header>
        <h1><b><u>Student Information</u></b></h1>
        
    </header>
    <main>
        <!--Creating Table here -->
        <table border="1">
           <!--Table Row -->
           <!--Row 1-->
            <tr>
             <!--Table header-->
            <th>Student Name</th>
            <th>Student Age</th>
            <th>Student Marks</th>
           </tr>
           <!--Row2 -->
           <tr>
             <!--Table Data-->
            <td>Rahul</td>
            <td>20</td>
            <td>90</td>
           </tr>
           <!--Row3 -->
           <tr>
             <!--Table Data-->
            <td>Raj</td>
            <td>21</td>
            <td>80</td>
           </tr>
           <!--Row4 -->
           <tr>
             <!--Table Data-->
            <td>Ram</td>
            <td>21</td>
            <td>100</td>
           </tr>
           <!--Row5 -->
           <tr>
            <td colspan="3">This is the  Last Page Of the list of the given Students.</td>
           </tr>
           
        </table>
        </main>
        
        <footer>
            <p>This is Info About Students.</p>
        </footer>
    
</body>
</html>
