<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Picture Tag Example</title>
</head>
<body>
    <h1>Picture Tag Example</h1>
    <picture>
        <source media="(min-width: 600px)" srcset="image-large.jpg">
        <img src="image-small.jpg" alt="Description of the image">
    </picture>
</body>
</html>
