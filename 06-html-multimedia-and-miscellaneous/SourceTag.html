<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Source Tag Example  </title>
</head>
<body>
    <!--Source Tag Example-->
<h1>HTML Source Tag Example</h1>
<p>The <strong>source</strong> tag is used to specify multiple media resources for media elements like <strong>audio</strong> and <strong>video</strong>. It allows the browser to choose the best format supported by the user's device.</p>
<video width="320" height="240" controls>
    <source src="movie.mp4" type="video/mp4">
    <source src="movie.ogg" type="video/ogg">
    Your browser does not support the video tag.
</video>
</body>
</html>
