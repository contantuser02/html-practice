<body>
    <!--Time Tag Example-->
<h1>HTML Time Tag Example</h1>

<p>The <strong>time</strong> tag is used to represent a specific time or date. It can be used to provide machine-readable dates and times, which can be useful for search engines and other applications.</p>

<p>Example of a specific date: <time datetime="2024-06-15">June 15, 2024</time></p>
