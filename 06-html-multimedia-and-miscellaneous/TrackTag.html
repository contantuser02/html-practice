<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Track Tag Example</title>
</head>
<body>
    <!--Track Tag Example-->

<h1>HTML Track Tag Example</h1>
<p>The <strong>track</strong> tag is used to specify text tracks for media elements like <strong>video</strong> and <strong>audio</strong>. It is commonly used for subtitles, captions, and other text-based information.</p>
<video width="320" height="240" controls>
    <source src="movie.mp4" type="video/mp4">
    <track src="subtitles_en.vtt" kind="subtitles" srclang="en" label="English">
    <track src="subtitles_es.vtt" kind="subtitles" srclang="es" label="Spanish">
    Your browser does not support the video tag.
</video>
    
</body>
</html>
