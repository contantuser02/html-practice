
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Check box</title>
</head>
<body>
    <!--Check box Examples-->
    <h3> Choose Your Favourite Fruits</h3>
    
        <input type="checkbox" 
        value="Mango" 
        name="Fruits"
        id="Mango">
        <label for="Mango">Mango</label>
        <br>
        
        <input type="checkbox"
        name="Fruits"
        value="Banana"
        id="Banana">
        <label for="Banana">Banana</label>
        <br>
       
        <input 
        type="checkbox"
        id="Watermelon"
        value="Watermelon"
        name="Fruits">
         <label for="Watermelon">WaterMelon</label>



   
</body>
</html>
