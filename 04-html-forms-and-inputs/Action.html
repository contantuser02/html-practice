<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Input Tag </title>
</head>
<body>
    <!--This is Form tag -->
    <!--Action is Also Used here With Form Tag-->
    <form action="/StoreHere">
        <!--input Tag is used Here-->
        
        UserName:<input type="text" 
        placeholder="Enter Your Name Here." 
        required="True"><br>
        Password:<input type="password"><br>
        <input type="submit">
    </form>
    
</body>
</html>
