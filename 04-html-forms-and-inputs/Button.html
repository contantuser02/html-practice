<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> Input Type Button </title>
</head>
<body>
    
     <form>
        <!-- Simple Button -->
         <label for="Click">Button</label>
         <input type="button" id="Click" Value="Click here">
         <br>

         <!--Disabled Button-->
         <label for="Dis">Disabled Button</label>
         <input type="button" value="disabled" id="Dis" disabled>
        <br>
         <!--Alert Button-->
         <label >Alert Message</label>
         <input 
         type="button"
         value="Show Alert"
         onclick="alert('You Missed Some Important Steps')"
         >
       
     </form>
    
</body>
</html>
