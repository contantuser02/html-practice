<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Change BackGround Color</title>
</head>
<body>
    <!-- Change Back Ground Color By input Method-->
     <label>Green Color:</label>
     <input
     type="button"
     value="Click Here"
     onclick="document.body.style.background='lightGreen'"
     >
     <br>
     <!--Change The color to Red-->
    <label>Red Color:</label>
    <input
    type="button"
    Value="Click Here"
    onclick="document.body.style.background='red'"
    >
    <br>
    <!--Change the color to White-->
    <label>White Color:</label>
    <input
    type="button"
    value="Click Here"
    onclick="document.body.style.background='white'">
    
</body>
</html>
