<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Label</title>
</head>
<body>
    <!--This is Form tag -->
    <!--Action is Also Used here With Form Tag-->
    <form action="/StoreHere">
        <!--input Tag is used Here-->
        <!-- Label Is also Used Here-->
        <label for="Name">UserName:</label>
        <input type="text" 
        id="Name"
        placeholder="Enter Your Name Here." 
        required="True"><br>
        <label for="User_password">Password:</label>
        <input type="password" id="User_password"><br>
        <input type="submit">
    </form>
    
</body>
</html>
