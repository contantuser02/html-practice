<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Use Case Of Radio Button </title>
</head>
<body>
    <form>
        <label for="Male">Male</label>
        <input 
        type="radio"
        name="gender"
        id="Male">
        <label for="female">Female</label>
        <input 
        type="radio"
        name="gender"
        id="Female">
        <label for="Other">Other</label>
        <input 
        type="radio"
        name="gender"
        id="Other">

    </form>
    
</body>
</html>
