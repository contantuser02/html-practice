<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Input Tag </title>
</head>
<body>
    <!--This is Form tag -->
    <form>
        <!--input Tag is used Here-->
        <b>
        UserName:<input type="text"><br>
        Password:<input type="password">
        </b>
        <br>
        <hr>
        <!--Input Tag With Placholder Using-->
        <b>
        UserName:<input type="text" placeholder ="Enter your Name"><br>
        Password:<input type="password">
        </b>

        <!--Input Using Required ....-->
        <br>
        <hr>
        <b>
        UserName:<input type="text" placeholder ="Enter Name" required="True"><br>
        Password:<input type="password" placeholder="Enter your Password">
        </b>

    </form>
    
</body>
</html>
