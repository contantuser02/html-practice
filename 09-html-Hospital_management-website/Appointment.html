<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Appointment Details</title>
</head>
<body>
    <header>
        <!--Back Button-->
        <table border="1" width="100%" cellpading="50"  align="center">
            <tr>
                <td></td>
            </tr>
            <div >
        <table border="2" width="10%" height="80px" align="left" >
            <hr>
            <td><a href="Services.html"><h3 align="center" style="color: rgb(4, 49, 251);">Back</h3></a></td>
        </table>
        </div>
    </header>
    <main>
        <!--
          BOOK APPOINTMENT-->

<section id="appointment">

<center>

<h1>📅 Book an Appointment</h1>

<p>

Schedule your appointment with our experienced doctors.
Our medical team will contact you shortly after your request.

</p>

</center>

<form>

<fieldset>

<legend>

Patient Information

</legend>

<label>

👤 Full Name

</label>

<br>

<input
type="text"
size="40"
placeholder="Enter Full Name" required="True">

<br><br>

<label>

📧 Email Address

</label>

<br>

<input
type="email"
size="40"
placeholder="Enter Email" required="True">

<br><br>

<label>

📞 Mobile Number

</label>

<br>

<input
type="tel"
size="40"
placeholder="Enter Mobile Number" required="True">

<br><br>

<label>

🎂 Age

</label>

<br>

<input
type="number" required="True">

<br><br>

<label>

⚧ Gender

</label>

<br>

<input
type="radio"
name="gender"> Male

<input
type="radio"
name="gender"> Female

<input
type="radio"
name="gender"> Other

<br><br>

<label>

🏥 Department

</label>

<br>

<select>

<option>

Select Department

</option>

<option>

Cardiology

</option>

<option>

Neurology

</option>

<option>

Orthopedics

</option>

<option>

Pediatrics

</option>

<option>

Dental

</option>

</select>

<br><br>

<label>

👨‍⚕️ Choose Doctor

</label>

<br>

<select>

<option>

Select Doctor

</option>

<option>

Dr. Rajesh Sharma

</option>

<option>

Dr. Priya Patel

</option>

<option>

Dr. Amit Mehta

</option>

</select>

<br><br>

<label>

📅 Appointment Date

</label>

<br>

<input type="date">

<br><br>

<label>

🕒 Appointment Time

</label>

<br>

<input type="time">

<br><br>

<label>

🤒 Medical Problem

</label>

<br>

<textarea
rows="6"
cols="50"
placeholder="Describe your health problem...">

</textarea>

<br><br>

<input type="submit" value="Book Appointment">

<button>

Reset

</button>

</fieldset>

</form>

</section>
    </main>





    
    
</body>
</html>
